# docker-compose.yml
version: "3.9"

services:
  # 1. 데이터베이스 (PostgreSQL)
  tm_db:
    image: postgres:16
    container_name: tm_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - tm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      retries: 5
      timeout: 5s
    ports:
      - "5432:5432" # 로컬 DB 관리 툴(DBeaver 등) 접속용
    restart: unless-stopped
    networks:
      - tm_net

  # 2. 백엔드 (Django)
  tm_backend:
    build: ./backend
    container_name: tm_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app # 코드 수정 시 즉시 반영 (Hot Reload)
    ports:
      - "8000:8000"
    depends_on:
      tm_db:
        condition: service_healthy # DB가 완전히 켜진 뒤에 Django 실행 (중요!)
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST} # settings.py가 이걸 읽음
      - POSTGRES_PORT=${POSTGRES_PORT}

    networks:
      - tm_net

  # 3. Redis (캐시 및 추후 비동기 작업용)
  tm_redis:
    image: redis:7-alpine
    container_name: tm_redis
    command: [ "redis-server", "--appendonly", "no" ]
    volumes:
      - tm_redis_data:/data
    networks:
      - tm_net

volumes:
  tm_postgres_data:
  tm_redis_data:

networks:
  tm_net:
    driver: bridge